# Configuración del Proyecto Iris Classification
project:
  name: "iris-classification"
  version: "1.0.0"

data:
  raw_path: "data/raw/iris.csv"
  processed_path: "data/processed/iris_processed.csv"
  test_size: 0.2
  random_state: 42
  expected_columns:
    - "sepal_length"
    - "sepal_width"
    - "petal_length"
    - "petal_width"
    - "species"

model:
  algorithm: "RandomForest"
  parameters:
    n_estimators: 100
    max_depth: 5
    random_state: 42
  model_path: "models/iris_model.pkl"
  preprocessor_path: "models/preprocessor.pkl"

preprocessing:
  scaling_method: "standard"

evaluation:
  metrics:
    - "accuracy"
    - "precision"
    - "recall"
    - "f1_score"
  min_accuracy: 0.85

logging:
  level: "INFO"
  log_file: "logs/training.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
